name: עדכון מאגר רופאים - מנורה + כלל + הראל (אוטומטי) + איילון + פניקס (קבצים)

# רץ אוטומטית כל יום ראשון ב-05:00 UTC (~08:00 בישראל), וגם ניתן להריץ ידנית מהכפתור
on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: שליפת הריפו
        uses: actions/checkout@v4

      - name: התקנת Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ספריית קריאת אקסל
        run: pip install openpyxl

      - name: הורדת ה-CSV ממנורה
        run: |
          curl -fsSL -H 'User-Agent: Mozilla/5.0' \
            "https://www.menoramivt.co.il/doctors-search/api/v1/get-file-data/" \
            -o menora.csv
          echo "מנורה — גודל:"; wc -c menora.csv

      - name: הורדת ה-CSV מכלל
        run: |
          curl -fsSL -H 'User-Agent: Mozilla/5.0' \
            "https://www.clalbit.co.il/media/nsgjqvts/%D7%A8%D7%A9%D7%99%D7%9E%D7%AA-%D7%A8%D7%95%D7%A4%D7%90%D7%99%D7%9D-%D7%91%D7%94%D7%A1%D7%93%D7%A8.csv" \
            -o clal.csv
          echo "כלל — גודל:"; wc -c clal.csv

      - name: הורדת האקסל מהראל
        run: |
          curl -fsSL -H 'User-Agent: Mozilla/5.0' \
            "https://www.harel-group.co.il/DocumentsAndForms/surgeons/allsurgeons.xlsx" \
            -o harel.xlsx
          echo "הראל — גודל:"; wc -c harel.xlsx

      # איילון + פניקס: נקראים מקבצים קבועים בריפו (ayalon.csv, phoenix.csv) כי
      # האתרים שלהם חוסמים הורדה אוטומטית (403 / חומת אש).
      # לעדכון — מחליפים את הקובץ המתאים בריפו ומריצים את ה-workflow.
      - name: בניית data.json
        run: |
          python build_data.py --html index.html --out data.json \
            --menora menora.csv --clal clal.csv --harel harel.xlsx \
            --ayalon ayalon.csv --phoenix phoenix.csv

      - name: דחיפת העדכון (רק אם השתנה)
        run: |
          if ! git diff --quiet -- data.json; then
            git config user.name  "doctors-update-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "עדכון אוטומטי - מאגר רופאים ($(date +%F))"
            git push
            echo "✓ data.json עודכן ונדחף."
          else
            echo "אין שינויים השבוע."
          fi
