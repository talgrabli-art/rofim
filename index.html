<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר רופאים בהסדר · כלי צוות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1F5; --surface:#FFFFFF; --surface-2:#F7F9FB; --surface-3:#EFF3F7;
  --header:#0E1726; --header-2:#1A2740;
  --ink:#0F1B2D; --ink-2:#46566B; --ink-3:#8190A3; --ink-4:#AEB9C7;
  --line:#E3E8EF; --line-2:#CFD7E2;
  --btn:#1E293B; --btn-hover:#0B1320;
  --focus:#2D7FF9; --danger:#B42318; --ok:#157347;
  --c-ayalon:#2563EB; --c-clal:#0D9488; --c-migdal:#DC2626; --c-menora:#16A34A; --c-phoenix:#EA580C;--c-harel:#7C3AED;
  --r:10px; --r-sm:7px; --r-lg:16px;
  --sh-1:0 1px 2px rgba(16,27,45,.06),0 1px 3px rgba(16,27,45,.05);
  --sh-2:0 4px 12px rgba(16,27,45,.08),0 2px 4px rgba(16,27,45,.06);
  --sh-3:0 16px 48px rgba(16,27,45,.18),0 4px 12px rgba(16,27,45,.10);
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Assistant',system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::selection{background:#0E1726;color:#fff}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* ---------- Header ---------- */
.top{background:var(--header);color:#fff;position:sticky;top:0;z-index:40;
  border-bottom:1px solid #000;box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
.top-in{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.logo-badge{height:46px;flex:0 0 auto;background:#fff;border-radius:10px;padding:5px 9px;
  display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo-badge img{height:100%;width:auto;display:block}
.brand-txt h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:21px;margin:0;line-height:1.05;letter-spacing:-.01em}
.brand-txt p{margin:1px 0 0;font-size:12px;color:#9fb0c6;font-weight:500;letter-spacing:.01em}
.stats{display:flex;gap:7px;margin-inline-start:auto;flex-wrap:wrap}
.stat{background:var(--header-2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);
  padding:7px 13px;min-width:78px;line-height:1.1}
.stat b{display:block;font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.stat small{display:block;font-size:10.5px;color:#9fb0c6;font-weight:600;margin-top:2px;letter-spacing:.02em}
.stat.live b{color:#fff}

/* ---------- Layout ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:20px 24px 60px;display:grid;
  grid-template-columns:286px 1fr;gap:20px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1)}

/* ---------- Sidebar ---------- */
.side{position:sticky;top:91px}
.side-h{padding:15px 18px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.side-h .ttl{font-weight:800;font-size:13px;letter-spacing:.04em;color:var(--ink-2);text-transform:uppercase}
.clear-btn{font-size:12.5px;font-weight:600;color:var(--ink-3);padding:4px 8px;border-radius:6px;transition:.15s}
.clear-btn:hover{color:var(--danger);background:#fdeeed}
.clear-btn[disabled]{opacity:.4;pointer-events:none}
.fgroup{padding:15px 18px;border-bottom:1px solid var(--line)}
.fgroup:last-child{border-bottom:none}
.flabel{font-size:12px;font-weight:700;color:var(--ink-3);letter-spacing:.03em;margin-bottom:9px;display:flex;align-items:center;gap:6px;text-transform:uppercase}

/* search */
.search{position:relative}
.search input{width:100%;padding:11px 38px 11px 12px;border:1.5px solid var(--line-2);border-radius:var(--r);
  font-size:14.5px;color:var(--ink);background:var(--surface-2);transition:.15s}
.search input:focus{outline:none;border-color:var(--btn);background:#fff;box-shadow:0 0 0 3px rgba(30,41,59,.08)}
.search input::placeholder{color:var(--ink-4)}
.search .ic{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.search .x{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;
  border-radius:50%;display:none;place-items:center;color:var(--ink-3)}
.search .x:hover{background:var(--surface-3);color:var(--ink)}
.search.has .x{display:grid} .search.has .ic{display:none}

/* insurer chips */
.ins-grid{display:flex;flex-direction:column;gap:6px}
.ins-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1.5px solid var(--line);
  border-radius:var(--r);transition:.14s;background:var(--surface);text-align:start;width:100%}
.ins-row:hover{border-color:var(--line-2);background:var(--surface-2)}
.ins-row .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto;background:var(--cc);transition:.14s}
.ins-row .nm{font-weight:700;font-size:14px;flex:1}
.ins-row .ct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.ins-row .ck{width:18px;height:18px;border:1.5px solid var(--line-2);border-radius:5px;flex:0 0 auto;
  display:grid;place-items:center;transition:.14s}
.ins-row .ck svg{opacity:0;transform:scale(.6);transition:.14s}
.ins-row.on{border-color:var(--cc);background:color-mix(in srgb,var(--cc) 7%,white)}
.ins-row.on .ck{background:var(--cc);border-color:var(--cc)}
.ins-row.on .ck svg{opacity:1;transform:scale(1)}
.ins-row.on .nm{color:color-mix(in srgb,var(--cc) 55%,var(--ink))}
.mini-actions{display:flex;gap:6px;margin-top:9px}
.mini-actions button{flex:1;font-size:12px;font-weight:600;color:var(--ink-2);padding:6px;border:1px solid var(--line);
  border-radius:7px;background:var(--surface-2);transition:.14s}
.mini-actions button:hover{background:var(--surface-3);border-color:var(--line-2)}

/* combobox */
.combo{position:relative}
.combo-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--line-2);
  border-radius:var(--r);background:var(--surface-2);font-size:14px;color:var(--ink);text-align:start;transition:.15s}
.combo-btn:hover{border-color:var(--line-2);background:#fff}
.combo-btn.active{border-color:var(--btn);background:#fff}
.combo-btn .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.combo-btn .lbl.ph{color:var(--ink-4)}
.combo-btn .chev{color:var(--ink-3);transition:.2s;flex:0 0 auto}
.combo-btn .clr{color:var(--ink-3);width:20px;height:20px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}
.combo-btn .clr:hover{background:var(--surface-3);color:var(--ink)}
.combo.open .chev{transform:rotate(180deg)}
.combo-pop{position:absolute;top:calc(100% + 6px);inset-inline:0;background:#fff;border:1px solid var(--line-2);
  border-radius:var(--r);box-shadow:var(--sh-3);z-index:30;overflow:hidden;display:none;flex-direction:column}
.combo.open .combo-pop{display:flex}
.combo-search{padding:9px;border-bottom:1px solid var(--line)}
.combo-search input{width:100%;padding:8px 11px;border:1.5px solid var(--line-2);border-radius:8px;font-size:13.5px}
.combo-search input:focus{outline:none;border-color:var(--btn)}
.combo-list{max-height:248px;overflow-y:auto;padding:5px}
.combo-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:13.5px;cursor:pointer;transition:.1s}
.combo-opt:hover{background:var(--surface-2)}
.combo-opt.sel{background:color-mix(in srgb,var(--btn) 8%,white);font-weight:700}
.combo-opt .on-spec{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.combo-opt .cnt{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-4)}
.combo-empty{padding:18px;text-align:center;color:var(--ink-3);font-size:13px}

/* toggles */
.tog{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer}
.tog .sw{width:38px;height:22px;border-radius:11px;background:var(--line-2);position:relative;flex:0 0 auto;transition:.18s}
.tog .sw::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;
  inset-inline-start:3px;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.tog.on .sw{background:var(--btn)}
.tog.on .sw::after{inset-inline-start:19px}
.tog .tl{font-size:13.5px;font-weight:600;color:var(--ink-2)}
.tog.on .tl{color:var(--ink)}

/* ---------- Results ---------- */
.res-bar{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.res-count{font-size:14px;color:var(--ink-2);font-weight:600}
.res-count b{font-family:'IBM Plex Mono',monospace;color:var(--ink);font-weight:600;font-size:16px}
.spacer{flex:1}
.viewtog{display:flex;background:var(--surface-3);border-radius:9px;padding:3px;gap:2px}
.viewtog button{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:700;color:var(--ink-3);transition:.14s;display:flex;align-items:center;gap:6px}
.viewtog button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-1)}
.sortsel{display:flex;align-items:center;gap:6px}
.sortsel select{border:1px solid var(--line-2);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;
  color:var(--ink-2);background:var(--surface-2);font-family:inherit}
.sortsel select:focus{outline:none;border-color:var(--btn)}
.exp-btn{display:flex;align-items:center;gap:7px;padding:8px 13px;background:var(--btn);color:#fff;border-radius:9px;
  font-size:13px;font-weight:700;transition:.15s}
.exp-btn:hover{background:var(--btn-hover)}
.exp-btn[disabled]{opacity:.4;pointer-events:none}

.list{padding:10px}
/* arrangement card */
.card{display:block;width:100%;text-align:start;background:var(--surface);border:1px solid var(--line);
  border-inline-start:4px solid var(--cc);border-radius:var(--r);padding:13px 15px 13px 15px;margin-bottom:9px;
  transition:.14s;position:relative}
.card:hover{border-color:var(--line-2);box-shadow:var(--sh-2);transform:translateY(-1px)}
.card:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(45,127,249,.35),var(--sh-2)}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-name{flex:1;min-width:0}
.card-name .nm{font-size:16.5px;font-weight:700;color:var(--ink);line-height:1.2}
.card-name .nm .ti{color:var(--ink-3);font-weight:600;font-size:14px}
.card-name .sub{font-size:13px;color:var(--ink-2);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.spec-pill{font-weight:700;color:var(--ink);background:var(--surface-3);padding:2px 9px;border-radius:20px;font-size:12.5px}
.dotsep{width:3px;height:3px;border-radius:50%;background:var(--ink-4);flex:0 0 auto}
.lic{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.card-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
.chip{font-size:12px;font-weight:800;padding:4px 11px;border-radius:7px;white-space:nowrap;
  background:color-mix(in srgb,var(--cc) 13%,white);color:color-mix(in srgb,var(--cc) 72%,black);
  border:1px solid color-mix(in srgb,var(--cc) 30%,white)}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:6px;
  background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2)}
.tag.city{color:var(--ink-2)}
.tag svg{flex:0 0 auto}
.tag.yes{background:#eaf6ee;border-color:#bfe3c9;color:var(--ok)}
.tag.no{background:var(--surface-2);border-color:var(--line);color:var(--ink-4)}
.tag.exp{background:#fdeeed;border-color:#f3c9c4;color:var(--danger)}
.tag.act{background:#eaf6ee;border-color:#bfe3c9;color:var(--ok)}

/* doctor (merged) card */
.dcard .cover{display:flex;align-items:center;gap:7px;margin-top:11px;flex-wrap:wrap}
.dcard .cover .lbl{font-size:11.5px;font-weight:700;color:var(--ink-3);margin-inline-end:2px}
.icoverchip{font-size:12px;font-weight:800;padding:4px 10px;border-radius:7px;white-space:nowrap;
  background:color-mix(in srgb,var(--cc) 14%,white);color:color-mix(in srgb,var(--cc) 72%,black);
  border:1px solid color-mix(in srgb,var(--cc) 32%,white);display:inline-flex;align-items:center;gap:5px}
.icoverchip .pin{width:5px;height:5px;border-radius:50%;background:var(--cc)}
.cnt-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--header);color:#fff;border-radius:20px;
  padding:2px 8px;font-weight:600;margin-inline-start:auto}

/* load more / empty */
.loadmore{display:flex;justify-content:center;padding:14px 0 6px}
.loadmore button{padding:11px 26px;background:var(--surface);border:1.5px solid var(--line-2);border-radius:10px;
  font-weight:700;font-size:13.5px;color:var(--ink-2);transition:.15s}
.loadmore button:hover{background:var(--btn);color:#fff;border-color:var(--btn)}
.empty{padding:64px 24px;text-align:center}
.empty .ic{width:60px;height:60px;border-radius:16px;background:var(--surface-3);display:grid;place-items:center;
  margin:0 auto 16px;color:var(--ink-4)}
.empty h3{font-size:17px;margin:0 0 5px;color:var(--ink)}
.empty p{margin:0 0 16px;color:var(--ink-3);font-size:14px}
.empty button{padding:9px 18px;background:var(--btn);color:#fff;border-radius:9px;font-weight:700;font-size:13.5px}

/* ---------- Drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(10,16,26,.42);backdrop-filter:blur(2px);z-index:50;opacity:0;
  pointer-events:none;transition:opacity .22s}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;inset-inline-start:0;height:100%;width:min(460px,94vw);background:var(--surface-2);
  z-index:51;box-shadow:var(--sh-3);transform:translateX(-102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);
  display:flex;flex-direction:column}
[dir=rtl] .drawer{inset-inline-start:0;transform:translateX(102%)}
.drawer.show{transform:translateX(0)}
.dh{background:var(--header);color:#fff;padding:20px 22px;position:relative;flex:0 0 auto}
.dh .close{position:absolute;inset-inline-end:16px;top:16px;width:34px;height:34px;border-radius:9px;
  background:rgba(255,255,255,.08);display:grid;place-items:center;transition:.15s}
.dh .close:hover{background:rgba(255,255,255,.18)}
.dh .ttl{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:23px;line-height:1.15;padding-inline-end:42px}
.dh .ttl .ti{color:#9fb0c6;font-weight:500;font-size:16px;font-family:'Assistant'}
.dh .meta{display:flex;align-items:center;gap:10px;margin-top:9px;color:#9fb0c6;font-size:13px;flex-wrap:wrap}
.dh .meta .lic{color:#c3d0e0}
.dbody{overflow-y:auto;padding:18px 20px 30px;flex:1}
.dsec-h{font-size:12px;font-weight:800;letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase;
  margin:4px 0 11px;display:flex;align-items:center;gap:8px}
.dsec-h::after{content:"";flex:1;height:1px;background:var(--line)}
.arr-card{background:#fff;border:1px solid var(--line);border-inline-start:4px solid var(--cc);border-radius:var(--r);
  padding:13px 15px;margin-bottom:11px;box-shadow:var(--sh-1)}
.arr-card .ah{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.arr-card .ah .nm{font-weight:800;font-size:15px;color:color-mix(in srgb,var(--cc) 68%,black)}
.arr-card .ah .st{margin-inline-start:auto;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px}
.arr-card .ah .st.act{background:#eaf6ee;color:var(--ok)} .arr-card .ah .st.exp{background:#fdeeed;color:var(--danger)}
.kv{display:grid;grid-template-columns:96px 1fr;gap:7px 12px;font-size:13.5px}
.kv dt{color:var(--ink-3);font-weight:600;font-size:12.5px}
.kv dd{margin:0;color:var(--ink);font-weight:500}
.kv dd.mono{font-size:12.5px}
.srow{display:flex;gap:7px;margin-top:9px}
.sbadge{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
.sbadge.y{background:#eaf6ee;color:var(--ok)} .sbadge.n{background:var(--surface-3);color:var(--ink-4)}

/* CRM placeholder */
.crm{background:repeating-linear-gradient(135deg,#fff,#fff 12px,#fbfcfe 12px,#fbfcfe 24px);
  border:1.5px dashed var(--line-2);border-radius:var(--r);padding:18px;text-align:center;margin-top:6px}
.crm .ic{width:44px;height:44px;border-radius:12px;background:var(--header);display:grid;place-items:center;margin:0 auto 11px;color:#fff}
.crm h4{margin:0 0 5px;font-size:15px;color:var(--ink)}
.crm p{margin:0 0 14px;font-size:13px;color:var(--ink-3);line-height:1.5}
.crm .ghost{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:1.5px solid var(--line-2);
  border-radius:9px;font-weight:700;font-size:13px;color:var(--ink-3);background:#fff}
.crm .hooktag{display:inline-block;margin-top:11px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--ink-4);background:var(--surface-3);padding:3px 9px;border-radius:5px}

/* mobile filter toggle */
.mfilter{display:none}
.foot{max-width:var(--maxw);margin:8px auto 0;padding:0 24px;color:var(--ink-4);font-size:12px;text-align:center}

@media (max-width:920px){
  .wrap{grid-template-columns:1fr;gap:14px}
  .side{position:static;display:none}
  .side.show{display:block}
  .mfilter{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);font-weight:700;color:var(--ink);box-shadow:var(--sh-1)}
  .stats{width:100%;margin-inline-start:0}
  .stat{flex:1;min-width:0}
  .top-in{padding:12px 16px;gap:14px}
  .wrap{padding:14px 14px 50px}
}
@media (max-width:520px){
  .card-side{align-items:flex-start}
  .stat small{font-size:9.5px}
  .res-bar{gap:9px}
  .viewtog button{padding:7px 10px}
  .dh .ttl{font-size:20px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="top">

<script>
"use strict";
/* ============================================================================

   חיבור עתידי ל‑CRM:
   כל הגישה לנתונים עוברת דרך DataSource.load() בלבד. כיום הוא מחזיר תמונת מצב
   מוטמעת (PAYLOAD). כדי להזין מ‑CRM/שרת, החליפו את גוף load() בקריאת רשת, למשל:
       const res = await fetch('/api/crm/doctors', {headers:{Authorization:`Bearer ${token}`}});
       return normalize(await res.json());   // החזירו מערך רשומות במבנה הזהה ל‑decode()
   לכל רשומה יש מזהה יציב (d.id) ולכל רופא מאוחד מפתח (g.key) — נקודות העיגון ל‑CRM.
   ========================================================================== */

const INS_KEY = {"איילון":"ayalon","כלל":"clal","מגדל":"migdal","מנורה":"menora","פניקס":"phoenix","הראל":"harel"};
const cc = c => `var(--c-${INS_KEY[c]||'clal'})`;

const DataSource = {
  async load(){
    // מקור ראשי: data.json (מתעדכן אוטומטית). נפילה חזרה ל-PAYLOAD המוטמע אם לא זמין.
    try{
      const res = await fetch('./data.json', {cache:'no-store'});
      if(res.ok){
        const d = await res.json();
        if(Array.isArray(d) && d.length) return d;
      }
    }catch(e){ /* אם הקובץ חסר/שבור — משתמשים בתמונה המוטמעת */ }
    return decode(PAYLOAD);
  }
};
function decode(p){
  const {companies,titles,specialties,subs,cities,rows}=p;
  return rows.map((r,i)=>({
    id:"doc_"+i,
    company:companies[r[0]], name:r[1]||"—", lic:r[2]||"", title:titles[r[3]]||"",
    specialty:specialties[r[4]]||"", sub:subs[r[5]]||"",
    s3:r[6], s1:r[7], cities:(r[8]||[]).map(ci=>cities[ci]),
    hospital:r[9]||"", start:r[10]||"", end:r[11]||"", expired:!!r[12], lkey:r[13]||""
  }));
}

/* ---------------- state ---------------- */
const COMPANIES = Object.keys(INS_KEY);
let ALL=[];
const F = { q:"", ins:new Set(COMPANIES), spec:"", city:"", active:false, s1:false, s3:false };
let view="arr", sort="name", shown=0;
const PAGE=60;
let lastResults=[];

/* ---------------- helpers ---------------- */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const fmt=n=>n.toLocaleString("en-US");
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const collator=new Intl.Collator("he");
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)};}

const SVG={
  check:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M5 13l4 4L19 7"/></svg>',
  pin:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.7 7-11a7 7 0 1 0-14 0c0 5.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>',
  knife:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20 16 8m0 0 4-4-1-1-4 4m1 1-3-3"/></svg>',
  cal:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>'
};

/* ---------------- filtering ---------------- */
function matchRec(d){
  if(!F.ins.has(d.company)) return false;
  if(F.spec && d.specialty!==F.spec) return false;
  if(F.city && !d.cities.includes(F.city)) return false;
  if(F.active && d.expired) return false;
  if(F.s1 && d.s1!==1) return false;
  if(F.s3 && d.s3!==1) return false;
  if(F.q){
    const h=(d.name+" "+d.lic+" "+d.specialty+" "+d.sub+" "+d.cities.join(" ")).toLowerCase();
    if(!h.includes(F.q)) return false;
  }
  return true;
}
function buildDoctors(recs){
  const m=new Map();
  for(const d of recs){
    const k=d.lkey||("nl_"+d.id);
    let g=m.get(k);
    if(!g){g={key:k,name:d.name,title:d.title,lic:d.lic,specs:new Set(),cities:new Set(),ins:new Map(),s1:false,s3:false,active:false};m.set(k,g);}
    if(d.name.length>g.name.length){g.name=d.name;g.title=d.title;}
    if(d.specialty)g.specs.add(d.specialty);
    d.cities.forEach(c=>g.cities.add(c));
    if(!g.ins.has(d.company))g.ins.set(d.company,[]);
    g.ins.get(d.company).push(d);
    if(d.s1===1)g.s1=true; if(d.s3===1)g.s3=true; if(!d.expired)g.active=true;
  }
  return [...m.values()];
}
function compute(){
  const recs=ALL.filter(matchRec);
  if(view==="arr"){
    if(sort==="name") recs.sort((a,b)=>collator.compare(a.name,b.name));
    else if(sort==="ins") recs.sort((a,b)=>COMPANIES.indexOf(a.company)-COMPANIES.indexOf(b.company)||collator.compare(a.name,b.name));
    else recs.sort((a,b)=>collator.compare(a.cities[0]||"זזז",b.cities[0]||"זזז")||collator.compare(a.name,b.name));
    return recs;
  }
  const docs=buildDoctors(recs);
  if(sort==="ins") docs.sort((a,b)=>b.ins.size-a.ins.size||collator.compare(a.name,b.name));
  else if(sort==="city") docs.sort((a,b)=>collator.compare([...a.cities][0]||"זזז",[...b.cities][0]||"זזז")||collator.compare(a.name,b.name));
  else docs.sort((a,b)=>collator.compare(a.name,b.name));
  return docs;
}

/* ---------------- rendering ---------------- */
function titleHtml(t){return t?`<span class="ti">${esc(t)} </span>`:"";}
function citiesTags(cities){
  const arr=[...cities];
  let out=arr.slice(0,2).map(c=>`<span class="tag city">${SVG.pin}${esc(c)}</span>`).join("");
  if(arr.length>2) out+=`<span class="tag">+${arr.length-2}</span>`;
  return out;
}
function recCard(d){
  const status = d.end ? (d.expired?`<span class="tag exp">${SVG.cal}פג ${esc(d.end)}</span>`:`<span class="tag act">פעיל עד ${esc(d.end)}</span>`)
                       : `<span class="tag act">${SVG.cal}פעיל</span>`;
  const surg = d.s1===1?`<span class="tag yes">${SVG.knife}ניתח השנה</span>`
             : d.s3===1?`<span class="tag yes">${SVG.knife}ניתח ב‑3 שנים</span>`:"";
  return `<button class="card" style="--cc:${cc(d.company)}" data-key="${esc(d.lkey)}" data-id="${d.id}">
    <div class="card-top">
      <div class="card-name">
        <div class="nm">${titleHtml(d.title)}${esc(d.name)}</div>
        <div class="sub">
          ${d.specialty?`<span class="spec-pill">${esc(d.specialty)}</span>`:""}
          ${d.lic?`<span class="dotsep"></span><span class="lic">רישיון ${esc(d.lic)}</span>`:""}
        </div>
      </div>
      <div class="card-side"><span class="chip" style="--cc:${cc(d.company)}">${esc(d.company)}</span></div>
    </div>
    <div class="card-meta">${citiesTags(d.cities)}${surg}${status}</div>
  </button>`;
}
function docCard(g){
  const insChips=[...g.ins.keys()]
    .sort((a,b)=>COMPANIES.indexOf(a)-COMPANIES.indexOf(b))
    .map(c=>`<span class="icoverchip" style="--cc:${cc(c)}"><span class="pin"></span>${esc(c)}</span>`).join("");
  const specs=[...g.specs];
  const specHtml=specs.length?`<span class="spec-pill">${esc(specs[0])}</span>${specs.length>1?`<span class="tag">+${specs.length-1} התמחויות</span>`:""}`:"";
  const surg=g.s1?`<span class="tag yes">${SVG.knife}ניתח השנה</span>`:g.s3?`<span class="tag yes">${SVG.knife}ניתח ב‑3 שנים</span>`:"";
  return `<button class="card dcard" style="--cc:${cc([...g.ins.keys()][0])}" data-key="${esc(g.key)}">
    <div class="card-top">
      <div class="card-name">
        <div class="nm">${titleHtml(g.title)}${esc(g.name)}</div>
        <div class="sub">${specHtml}${g.lic?`<span class="dotsep"></span><span class="lic">רישיון ${esc(g.lic)}</span>`:""}</div>
      </div>
      <span class="cnt-badge">${g.ins.size} מבטחות</span>
    </div>
    <div class="card-meta">${citiesTags(g.cities)}${surg}</div>
    <div class="cover"><span class="lbl">בהסדר עם:</span>${insChips}</div>
  </button>`;
}
function render(reset=true){
  if(reset){lastResults=compute();shown=0;}
  shown=Math.min(shown+PAGE,lastResults.length);
  const slice=lastResults.slice(0,shown);
  const listEl=$("#list");
  if(lastResults.length===0){
    listEl.innerHTML=`<div class="empty"><div class="ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
      <h3>לא נמצאו רופאים</h3><p>אין רשומות שתואמות את הסינון הנוכחי.</p>
      <button id="emptyClear">איפוס הסינון</button></div>`;
    $("#emptyClear").onclick=clearAll;
  } else {
    const cards = view==="arr" ? slice.map(recCard).join("") : slice.map(docCard).join("");
    const more = shown<lastResults.length
      ? `<div class="loadmore"><button id="loadMore">הצג עוד ${Math.min(PAGE,lastResults.length-shown)} מתוך ${fmt(lastResults.length-shown)} שנותרו</button></div>`:"";
    listEl.innerHTML=cards+more;
    const lm=$("#loadMore"); if(lm) lm.onclick=()=>render(false);
    $$(".card",listEl).forEach(c=>c.onclick=()=>openDoctor(c.dataset.key,c.dataset.id));
  }
  // counts
  const unit=view==="arr"?"רשומות הסדר":"רופאים";
  $("#resCount").innerHTML=`<b>${fmt(lastResults.length)}</b> ${unit}${shown<lastResults.length?` · מוצגות ${fmt(shown)}`:""}`;
  $("#exportBtn").disabled=lastResults.length===0;
  updateLiveStats();
}

/* ---------------- live header stats ---------------- */
function updateLiveStats(){
  const recs=ALL.filter(matchRec);
  const docs=buildDoctors(recs);
  const multi=docs.filter(g=>g.ins.size>1).length;
  const active=recs.filter(d=>!d.expired).length;
  $("#stats").innerHTML=`
    <div class="stat live"><b>${fmt(recs.length)}</b><small>רשומות הסדר</small></div>
    <div class="stat live"><b>${fmt(docs.length)}</b><small>רופאים ייחודיים</small></div>
    <div class="stat live"><b>${fmt(multi)}</b><small>ביותר ממבטחת</small></div>
    <div class="stat live"><b>${fmt(active)}</b><small>הסכמים פעילים</small></div>`;
}

/* ---------------- drawer ---------------- */
function openDoctor(key,id){
  // אסוף את כל הרשומות של אותו רופא מכלל הנתונים (לא רק המסוננות)
  let recs = key && !key.startsWith("nl_") ? ALL.filter(d=>d.lkey===key) : ALL.filter(d=>d.id===id);
  if(!recs.length && id) recs=ALL.filter(d=>d.id===id);
  if(!recs.length) return;
  let name=recs[0].name,title=recs[0].title;
  recs.forEach(d=>{if(d.name.length>name.length){name=d.name;title=d.title;}});
  const lic=recs.find(d=>d.lic)?.lic||"";
  const byIns=new Map();
  recs.forEach(d=>{if(!byIns.has(d.company))byIns.set(d.company,[]);byIns.get(d.company).push(d);});
  const allCities=[...new Set(recs.flatMap(d=>d.cities))];
  const allSpecs=[...new Set(recs.map(d=>d.specialty).filter(Boolean))];

  const insOrder=[...byIns.keys()].sort((a,b)=>COMPANIES.indexOf(a)-COMPANIES.indexOf(b));
  const arrCards=insOrder.map(c=>{
    const list=byIns.get(c);
    return list.map(d=>{
      const active=!d.expired;
      const surg=`<div class="srow">
        <span class="sbadge ${d.s1===1?'y':'n'}">${SVG.knife} ניתוח בשנה: ${d.s1===1?'כן':(d.s1===0?'לא':'—')}</span>
        <span class="sbadge ${d.s3===1?'y':'n'}">ב‑3 שנים: ${d.s3===1?'כן':(d.s3===0?'לא':'—')}</span></div>`;
      return `<div class="arr-card" style="--cc:${cc(c)}">
        <div class="ah"><span class="nm">${esc(c)}</span>
          <span class="st ${active?'act':'exp'}">${active?'הסכם פעיל':'פג תוקף'}</span></div>
        <dl class="kv">
          ${d.specialty?`<dt>התמחות</dt><dd>${esc(d.specialty)}</dd>`:""}
          ${d.sub?`<dt>התמחות נוספת</dt><dd>${esc(d.sub)}</dd>`:""}
          ${d.cities.length?`<dt>ערי ייעוץ</dt><dd>${esc(d.cities.join(", "))}</dd>`:""}
          ${d.hospital?`<dt>בית חולים</dt><dd>${esc(d.hospital)}</dd>`:""}
          <dt>תוקף הסכם</dt><dd class="mono">${esc(d.start||"—")} ${d.end?" — "+esc(d.end):"— ללא תאריך סיום"}</dd>
        </dl>${surg}</div>`;
    }).join("");
  }).join("");

  const drawer=$("#drawer");
  drawer.innerHTML=`
    <div class="dh">
      <button class="close" id="dClose" aria-label="סגור"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="ttl">${title?`<span class="ti">${esc(title)} </span>`:""}${esc(name)}</div>
      <div class="meta">
        ${lic?`<span class="lic mono">רישיון ${esc(lic)}</span>`:""}
        ${allSpecs.length?`<span>·</span><span>${esc(allSpecs[0])}</span>`:""}
        <span>·</span><span>${byIns.size} מבטחות · ${recs.length} הסדרים</span>
      </div>
    </div>
    <div class="dbody">
      <div class="dsec-h">הסדרים לפי מבטחת</div>
      ${arrCards}
      <div class="dsec-h" style="margin-top:22px">כרטיס לקוח · CRM</div>
      <div class="crm">
        <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg></div>
        <h4>נתוני CRM יתווספו כאן</h4>
        <p>סטטוס התקשרות, אנשי קשר, פעילות אחרונה ועסקאות — ייטענו אוטומטית לאחר החיבור למערכת.</p>
        <span class="ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>פתח כרטיס ב‑CRM</span>
        <span class="hooktag">data-crm-key="${esc(lic||key||id)}"</span>
      </div>
    </div>`;
  $("#dClose").onclick=closeDrawer;
  $("#scrim").classList.add("show");
  drawer.classList.add("show");
  document.body.style.overflow="hidden";
}
function closeDrawer(){$("#drawer").classList.remove("show");$("#scrim").classList.remove("show");document.body.style.overflow="";}

/* ---------------- export ---------------- */
function exportCSV(){
  const rows=lastResults;
  const head=["מבטחת","תואר","שם","מספר רישיון","התמחות","התמחות נוספת","ערים","בית חולים","ניתוח בשנה","ניתוח ב-3 שנים","תחילת הסכם","סיום הסכם","סטטוס"];
  const lines=[head];
  if(view==="arr"){
    rows.forEach(d=>lines.push([d.company,d.title,d.name,d.lic,d.specialty,d.sub,d.cities.join(" | "),d.hospital,
      d.s1===1?"כן":d.s1===0?"לא":"",d.s3===1?"כן":d.s3===0?"לא":"",d.start,d.end,d.expired?"פג":"פעיל"]));
  } else {
    rows.forEach(g=>{const insList=[...g.ins.keys()].join(" | ");
      lines.push([insList,g.title,g.name,g.lic,[...g.specs].join(" | "),"",[...g.cities].join(" | "),"",
        g.s1?"כן":"",g.s3?"כן":"","","",g.active?"פעיל":"פג"]);});
  }
  const csv="\uFEFF"+lines.map(r=>r.map(c=>{c=String(c??"");return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`רשימת_רופאים_${view==="arr"?"לפי_הסדר":"לפי_רופא"}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

/* ---------------- combobox ---------------- */
function makeCombo(host,opts,placeholder,onChange){
  let value="",open=false,filter="";
  function close(){open=false;draw();}
  function draw(){
    const sel=opts.find(o=>o.v===value);
    const fopts=filter?opts.filter(o=>o.v.toLowerCase().includes(filter.toLowerCase())):opts;
    host.className="combo"+(open?" open":"");
    host.innerHTML=`
      <button class="combo-btn ${value?'active':''}" type="button">
        <span class="lbl ${value?'':'ph'}">${value?esc(value):placeholder}</span>
        ${value?`<span class="clr" role="button" aria-label="נקה"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></span>`:""}
        <span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg></span>
      </button>
      <div class="combo-pop">
        <div class="combo-search"><input type="search" placeholder="הקלד לסינון…" value="${esc(filter)}"></div>
        <div class="combo-list">
          ${fopts.length?fopts.map(o=>`<div class="combo-opt ${o.v===value?'sel':''}" data-v="${esc(o.v)}"><span class="on-spec">${esc(o.v)}</span><span class="cnt">${fmt(o.n)}</span></div>`).join(""):'<div class="combo-empty">אין תוצאות</div>'}
        </div>
      </div>`;
    const btn=$(".combo-btn",host);
    btn.onclick=e=>{e.stopPropagation();if(e.target.closest(".clr")){value="";onChange("");draw();return;}open=!open;filter="";draw();
      if(open){const si=$(".combo-search input",host);si&&si.focus();}};
    const si=$(".combo-search input",host);
    if(si){si.oninput=()=>{filter=si.value;draw();$(".combo-search input",host).focus();};
      si.onclick=e=>e.stopPropagation();}
    $$(".combo-opt",host).forEach(o=>o.onclick=()=>{value=o.dataset.v;onChange(value);close();});
  }
  draw();
  return {reset(){value="";draw();},get value(){return value;}};
}

/* ---------------- init ---------------- */
let comboSpec,comboCity;
async function init(){
  ALL=await DataSource.load();

  // insurer chips with counts
  const insGrid=$("#insGrid");
  insGrid.innerHTML=COMPANIES.map(c=>{
    const n=ALL.filter(d=>d.company===c).length;
    return `<button class="ins-row on" style="--cc:${cc(c)}" data-c="${esc(c)}">
      <span class="dot"></span><span class="nm">${esc(c)}</span><span class="ct">${fmt(n)}</span>
      <span class="ck">${SVG.check}</span></button>`;
  }).join("");
  $$(".ins-row",insGrid).forEach(r=>r.onclick=()=>{
    const c=r.dataset.c;
    if(F.ins.has(c)){F.ins.delete(c);r.classList.remove("on");}else{F.ins.add(c);r.classList.add("on");}
    syncClear();render();
  });
  $("#insAll").onclick=()=>{COMPANIES.forEach(c=>F.ins.add(c));$$(".ins-row",insGrid).forEach(r=>r.classList.add("on"));syncClear();render();};
  $("#insNone").onclick=()=>{F.ins.clear();$$(".ins-row",insGrid).forEach(r=>r.classList.remove("on"));syncClear();render();};

  // specialty + city combos (sorted by count desc)
  const specCounts={},cityCounts={};
  ALL.forEach(d=>{if(d.specialty)specCounts[d.specialty]=(specCounts[d.specialty]||0)+1;
    d.cities.forEach(c=>cityCounts[c]=(cityCounts[c]||0)+1);});
  const specOpts=Object.entries(specCounts).sort((a,b)=>b[1]-a[1]).map(([v,n])=>({v,n}));
  const cityOpts=Object.entries(cityCounts).sort((a,b)=>b[1]-a[1]).map(([v,n])=>({v,n}));
  comboSpec=makeCombo($("#comboSpec"),specOpts,"כל ההתמחויות",v=>{F.spec=v;syncClear();render();});
  comboCity=makeCombo($("#comboCity"),cityOpts,"כל הערים",v=>{F.city=v;syncClear();render();});

  // search
  const q=$("#q"),sw=$("#searchWrap");
  q.oninput=debounce(()=>{F.q=q.value.trim().toLowerCase();sw.classList.toggle("has",!!q.value);syncClear();render();},180);
  $("#qClear").onclick=()=>{q.value="";F.q="";sw.classList.remove("has");q.focus();syncClear();render();};

  // toggles
  bindTog("#togActive",v=>F.active=v);
  bindTog("#togS1",v=>F.s1=v);
  bindTog("#togS3",v=>F.s3=v);

  // view toggle
  $$("#viewTog button").forEach(b=>b.onclick=()=>{
    $$("#viewTog button").forEach(x=>x.classList.remove("on"));b.classList.add("on");view=b.dataset.v;render();
  });
  // sort
  $("#sort").onchange=e=>{sort=e.target.value;render();};
  // export
  $("#exportBtn").onclick=exportCSV;
  // clear all
  $("#clearAll").onclick=clearAll;
  // drawer scrim
  $("#scrim").onclick=closeDrawer;
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});
  // close combos on outside click
  document.addEventListener("click",e=>{
    [$("#comboSpec"),$("#comboCity")].forEach(c=>{if(c&&!c.contains(e.target))c.classList.remove("open");});
  });
  // mobile filter
  const mf=$("#mfilter");
  mf.onclick=()=>{const s=$("#side");const on=s.classList.toggle("show");mf.setAttribute("aria-expanded",on);};

  render();
  $("#foot").textContent=`תמונת מצב מקומית · ${fmt(ALL.length)} רשומות מ‑5 מבטחות · מוכן לחיבור CRM`;
}
function bindTog(sel,setter){const el=$(sel);el.onclick=()=>{const on=el.classList.toggle("on");setter(on);syncClear();render();};}
function clearAll(){
  F.q="";F.spec="";F.city="";F.active=false;F.s1=false;F.s3=false;COMPANIES.forEach(c=>F.ins.add(c));
  $("#q").value="";$("#searchWrap").classList.remove("has");
  $$(".ins-row").forEach(r=>r.classList.add("on"));
  $$(".tog").forEach(t=>t.classList.remove("on"));
  comboSpec.reset();comboCity.reset();
  syncClear();render();
}
function syncClear(){
  const active=F.q||F.spec||F.city||F.active||F.s1||F.s3||F.ins.size<COMPANIES.length;
  $("#clearAll").disabled=!active;
}

init();
</script>
